<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Halftime Advisor — {{ your_team }} vs {{ opp_team }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #2d3348;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    header img { height: 36px; object-fit: contain; }
    header h1 { font-size: 20px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.02em; }

    .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      font-size: 12px; font-weight: 600; color: #94a3b8; text-decoration: none;
      padding: 6px 12px; border: 1px solid #2d3348; border-radius: 6px;
      white-space: nowrap; display: inline-flex; align-items: center;
      justify-content: center; height: 32px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: #e2e8f0; border-color: #4f6ef7; background: #1e2130; }

    .hamburger {
      display: none; background: none; border: 1px solid #2d3348; color: #e2e8f0;
      font-size: 22px; padding: 6px 10px; border-radius: 8px; cursor: pointer;
      line-height: 1;
    }
    .mobile-menu {
      display: none; position: absolute; top: 100%; right: 0; z-index: 100;
      background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
      padding: 8px 0; min-width: 180px; margin-top: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .mobile-menu.open { display: flex; flex-direction: column; }
    .mobile-menu a {
      font-size: 14px; font-weight: 600; color: #94a3b8; text-decoration: none;
      padding: 12px 20px; border-bottom: 1px solid #2d3348;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: #e2e8f0; background: #252a3d; }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
      .ht-team-grid { grid-template-columns: 1fr; }
      .ht-textareas { grid-template-columns: 1fr; }
    }

    /* ── Re-submit form ── */
    .input-card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 36px;
    }
    .input-card h2 {
      font-size: 11px; font-weight: 700; color: #f59e0b;
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 16px;
    }
    .ht-team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 14px; }
    .ht-team-col { display: flex; flex-direction: column; gap: 10px; }
    .ht-textareas { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 11px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    input[type="text"] {
      background: #0f1117; border: 1px solid #2d3348; color: #e2e8f0;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      font-family: inherit; outline: none; width: 100%;
    }
    input[type="text"]:focus { border-color: #f59e0b; }
    textarea {
      background: #0f1117; border: 1px solid #2d3348; color: #e2e8f0;
      padding: 10px 14px; border-radius: 8px; font-size: 12px;
      font-family: 'Courier New', monospace; outline: none; width: 100%;
      resize: vertical; line-height: 1.5;
    }
    textarea:focus { border-color: #f59e0b; }

    .btn-halftime {
      background: #f59e0b; border: none; color: #0f1117;
      padding: 10px 24px; border-radius: 8px; font-size: 14px;
      font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-halftime:hover { background: #d97706; }

    /* ── Error ── */
    .error-banner {
      background: #2d1b1b; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 12px 18px; border-radius: 8px; font-size: 14px; margin-bottom: 28px;
    }

    /* ── Results header ── */
    .results-header { margin-bottom: 32px; }
    .results-header h2 {
      font-size: 22px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.02em;
    }
    .results-header .meta { font-size: 13px; color: #64748b; margin-top: 4px; }

    /* ── AI Result ── */
    .result-card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 28px 32px;
      margin-top: 28px;
    }
    .result-card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 16px;
    }
    .result-body {
      font-size: 14px;
      color: #e2e8f0;
      line-height: 1.7;
      word-wrap: break-word;
    }
    .result-body h3 {
      font-size: 16px; font-weight: 700; color: #f59e0b;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 28px 0 14px; padding-bottom: 8px;
      border-bottom: 1px solid #2d3348;
    }
    .result-body h3:first-child { margin-top: 0; }
    .result-body p { margin-bottom: 14px; }
    .result-body strong { color: #ffffff; font-weight: 700; }
    .result-body ul {
      list-style: none; padding: 0; margin: 0 0 16px;
    }
    .result-body ul li {
      padding: 6px 0 6px 18px; position: relative; color: #cbd5e1;
    }
    .result-body ul li::before {
      content: ""; position: absolute; left: 0; top: 14px;
      width: 6px; height: 6px; border-radius: 50%; background: #f59e0b;
    }
    .performers-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }
    @media (max-width: 640px) { .performers-grid { grid-template-columns: 1fr; } }
    .perf-col {
      background: #161926; border: 1px solid #2d3348; border-radius: 10px;
      padding: 18px 20px;
    }
    .perf-col h4, .perf-col strong:first-child {
      font-size: 12px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
      display: block;
    }
    .gameplan-bullet {
      background: #161926; border: 1px solid #2d3348; border-left: 4px solid #22c55e;
      border-radius: 10px; padding: 16px 20px; margin-bottom: 12px;
      font-size: 14px; color: #cbd5e1; line-height: 1.7;
    }
    .gameplan-bullet strong { color: #ffffff; }

    .scoreboard {
      display: flex; align-items: center; justify-content: center;
      gap: 24px; margin-bottom: 28px;
      background: #161926; border: 1px solid #2d3348; border-radius: 12px;
      padding: 24px 32px;
    }
    .score-team {
      text-align: center; flex: 1;
    }
    .score-team-name {
      font-size: 13px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .score-team-pts {
      font-size: 48px; font-weight: 800; color: #ffffff; line-height: 1;
      margin-top: 8px;
    }
    .score-team.winning .score-team-pts { color: #f59e0b; }
    .score-team.losing .score-team-pts { color: #475569; font-weight: 700; }
    .score-team.tied .score-team-pts { color: #f59e0b; }
    .score-divider {
      font-size: 12px; font-weight: 700; color: #64748b; padding: 0 16px;
      text-transform: uppercase; letter-spacing: 0.12em;
      display: flex; align-items: center;
    }

    .spinner-wrap {
      display: none;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .spinner-wrap.visible { display: flex; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #2d3348;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
<div class="container">

  <header style="position:relative;">
    <div class="header-left">
      <img src="https://assets.cdn.filesafe.space/hT14gzW082yuiAZaRY8l/media/69b751fdad02763a460b988c.png" alt="WhatIfSports" style="height: 81px; width: auto;"/>
    </div>
    <div class="nav-links">
      <a href="https://www.thenextguess.com/" target="_blank" rel="noopener" class="nav-link">The Next Guess</a>
      <a href="https://www.whatifsports.com/gd/office/" target="_blank" rel="noopener" class="nav-link">WIS Office</a>
      <a href="/scout" class="nav-link">Scout</a>
      <a href="/halftime-advisor" class="nav-link">Halftime</a>
      <a href="/recruiting" class="nav-link">Recruiting</a>
      <a href="/training" class="nav-link">Training</a>
      <a href="/account" class="nav-link">My Account</a>
      <a href="/logout" class="nav-link">Log Out</a>
    </div>
    <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">&#9776;</button>
    <div class="mobile-menu" id="mobileMenu">
      <a href="https://www.thenextguess.com/" target="_blank" rel="noopener">The Next Guess</a>
      <a href="https://www.whatifsports.com/gd/office/" target="_blank" rel="noopener">WIS Office</a>
      <a href="/scout">Scout</a>
      <a href="/halftime-advisor" class="">Halftime</a>
      <a href="/recruiting">Recruiting</a>
      <a href="/training">Training</a>
      <a href="/account">My Account</a>
      <a href="/logout">Log Out</a>
    </div>
  </header>

  <!-- Re-submit form -->
  <div class="input-card">
    <h2>⏱ Halftime Advisor</h2>
    <form method="POST" action="/halftime">
      <div class="ht-team-grid">
        <div class="ht-team-col">
          <div class="field">
            <label>Your Team</label>
            <input type="text" name="ht_your_team" value="{{ your_team }}"/>
          </div>
          <div class="field">
            <label>Your Offense</label>
            <select name="ht_your_offense" style="background:#0f1117;border:1px solid #2d3348;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;width:100%;">
              <option value="">-- Select --</option>
              {% for o in ['I Formation','Pro','Wishbone','Notre Dame Box','Shotgun','Trips'] %}
              <option value="{{ o }}" {% if your_offense == o %}selected{% endif %}>{{ o }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="ht-team-col">
          <div class="field">
            <label>Opponent Team</label>
            <input type="text" name="ht_opp_team" value="{{ opp_team }}"/>
          </div>
          <div class="field">
            <label>Opponent Defense</label>
            <select name="ht_their_defense" style="background:#0f1117;border:1px solid #2d3348;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;width:100%;">
              <option value="">-- Select --</option>
              {% for d in ['3-4','4-3','4-4','5-2','Nickel','Dime'] %}
              <option value="{{ d }}" {% if their_defense == d %}selected{% endif %}>{{ d }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
      <div class="ht-textareas">
        <div class="field">
          <label>Box Score &amp; Team Stats</label>
          <textarea name="ht_box_score" rows="10">{{ box_raw }}</textarea>
        </div>
        <div class="field">
          <label>Game Log</label>
          <textarea name="ht_game_log" rows="10">{{ gamelog_raw }}</textarea>
        </div>
      </div>
      <div class="ht-textareas">
        <div class="field">
          <label>Your Team Ratings</label>
          <textarea name="ht_your_ratings" rows="8" placeholder="Pos&#9;A&#9;Spd&#9;Str&#9;Blk&#9;Tkl&#9;Tot&#10;QB&#9;80&#9;75&#9;65&#9;50&#9;55&#9;88&#10;RB&#9;82&#9;86&#9;78&#9;62&#9;55&#9;88&#10;...">{{ your_ratings_raw }}</textarea>
        </div>
        <div class="field">
          <label>Opponent Team Ratings</label>
          <textarea name="ht_opp_ratings" rows="8" placeholder="Pos&#9;A&#9;Spd&#9;Str&#9;Blk&#9;Tkl&#9;Tot&#10;QB&#9;72&#9;68&#9;55&#9;40&#9;45&#9;85&#10;RB&#9;85&#9;88&#9;75&#9;60&#9;50&#9;90&#10;...">{{ opp_ratings_raw }}</textarea>
        </div>
      </div>
      <button type="submit" class="btn-halftime" id="submitBtn">Get Halftime Adjustments</button>
    </form>
  </div>

  <div id="errorBanner" class="error-banner" style="display:none;"></div>
  <div id="resultsSection" style="display:none;">
    <div class="results-header">
      <h2 id="resultsTitle"></h2>
      <div class="meta">AI halftime analysis</div>
    </div>
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="streamSpinner" class="spinner-wrap visible" style="justify-content:center;margin-bottom:20px;">
      <div class="spinner"></div>
      <span class="spinner-text" id="streamSpinnerText">Analyzing first half stats...</span>
    </div>
    <div class="result-card" id="resultCard" style="display:none;">
      <h2>Halftime Analysis</h2>
      <div class="result-body" id="resultBody"></div>
    </div>
  </div>

</div>
<script>
  // Mobile menu close on outside click
  document.addEventListener('click', function(e) {
    var menu = document.getElementById('mobileMenu');
    var hamburger = document.querySelector('.hamburger');
    if (menu && !menu.contains(e.target) && !hamburger.contains(e.target)) {
      menu.classList.remove('open');
    }
  });

  var spinnerMessages = [
    'Analyzing first half stats...',
    'Identifying key matchups...',
    'Building your second half game plan...'
  ];

  document.querySelector('form[action="/halftime"]').addEventListener('submit', function(e) {
    e.preventDefault();

    var btn = document.getElementById('submitBtn');
    var errorBanner = document.getElementById('errorBanner');
    var resultsSection = document.getElementById('resultsSection');
    var scoreboard = document.getElementById('scoreboard');
    var spinner = document.getElementById('streamSpinner');
    var spinnerText = document.getElementById('streamSpinnerText');
    var resultCard = document.getElementById('resultCard');
    var resultBody = document.getElementById('resultBody');
    var resultsTitle = document.getElementById('resultsTitle');

    var yourTeam = this.querySelector('[name="ht_your_team"]').value.trim();
    var oppTeam = this.querySelector('[name="ht_opp_team"]').value.trim();

    // Validation
    errorBanner.style.display = 'none';
    if (!yourTeam || !oppTeam) {
      errorBanner.textContent = 'Please enter both team names.';
      errorBanner.style.display = '';
      return;
    }
    var boxScore = this.querySelector('[name="ht_box_score"]').value.trim();
    var gameLog = this.querySelector('[name="ht_game_log"]').value.trim();
    if (!boxScore && !gameLog) {
      errorBanner.textContent = 'Please paste at least a box score or game log.';
      errorBanner.style.display = '';
      return;
    }

    // Disable button
    btn.disabled = true;
    btn.textContent = 'Analyzing...';
    btn.style.background = '#2d3348';
    btn.style.color = '#64748b';
    btn.style.cursor = 'not-allowed';

    // Show results section with spinner
    resultsTitle.textContent = yourTeam + ' vs ' + oppTeam;
    scoreboard.style.display = 'none';
    scoreboard.innerHTML = '';
    resultCard.style.display = 'none';
    resultBody.innerHTML = '';
    spinner.style.display = 'flex';
    spinnerText.textContent = spinnerMessages[0];
    resultsSection.style.display = '';

    // Rotate spinner messages
    var msgIdx = 0;
    var msgInterval = setInterval(function() {
      msgIdx = (msgIdx + 1) % spinnerMessages.length;
      spinnerText.textContent = spinnerMessages[msgIdx];
    }, 3000);

    function resetBtn() {
      btn.disabled = false;
      btn.textContent = 'Get Halftime Adjustments';
      btn.style.background = '';
      btn.style.color = '';
      btn.style.cursor = '';
    }

    var formData = new FormData(this);
    var started = false;

    fetch('/halftime-stream', { method: 'POST', body: formData })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Server returned ' + response.status);
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';

        function processChunk(result) {
          if (result.done) {
            clearInterval(msgInterval);
            spinner.style.display = 'none';
            resetBtn();
            return;
          }
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith('data: ')) continue;
            var json;
            try { json = JSON.parse(line.substring(6)); } catch(e) { continue; }

            if (json.chunk) {
              if (!started) {
                started = true;
                resultCard.style.display = '';
                spinner.style.display = 'none';
                clearInterval(msgInterval);
              }
              resultBody.innerHTML += json.chunk;
            } else if (json.done) {
              resultBody.innerHTML = json.done;
              spinner.style.display = 'none';
              clearInterval(msgInterval);
              // Show scoreboard if scores were returned
              if (json.your_score != null && json.opp_score != null) {
                var ys = json.your_score, os = json.opp_score;
                var yClass = ys > os ? 'winning' : ys < os ? 'losing' : 'tied';
                var oClass = os > ys ? 'winning' : os < ys ? 'losing' : 'tied';
                scoreboard.innerHTML =
                  '<div class="score-team ' + yClass + '"><div class="score-team-name">' + yourTeam + '</div><div class="score-team-pts">' + ys + '</div></div>' +
                  '<div class="score-divider">Halftime</div>' +
                  '<div class="score-team ' + oClass + '"><div class="score-team-name">' + oppTeam + '</div><div class="score-team-pts">' + os + '</div></div>';
                scoreboard.style.display = '';
              }
              resetBtn();
            } else if (json.error) {
              spinner.style.display = 'none';
              clearInterval(msgInterval);
              errorBanner.textContent = json.error;
              errorBanner.style.display = '';
              resetBtn();
            }
          }
          return reader.read().then(processChunk);
        }

        return reader.read().then(processChunk);
      })
      .catch(function(err) {
        clearInterval(msgInterval);
        spinner.style.display = 'none';
        errorBanner.textContent = 'Connection error: ' + err.message;
        errorBanner.style.display = '';
        resetBtn();
      });
  });
</script>
</body>
</html>
