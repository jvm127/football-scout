<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Restricted</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: #0f1117; color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
      padding: 40px 48px; text-align: center; max-width: 440px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    a {
      display: inline-block; background: #f59e0b; color: #0f1117;
      padding: 10px 24px; border-radius: 8px; font-size: 14px;
      font-weight: 700; text-decoration: none;
    }
    a:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Access Restricted</h1>
    <p>Your account does not have access to this tool. Contact your administrator to request access.</p>
    <a href="/scout">Back to Home</a>
  </div>
</body>
</html>
