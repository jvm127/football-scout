<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Football Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    .banner {
      width: 100%;
      max-height: 280px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #2d3348;
    }
    .banner img {
      width: 100%;
      max-width: 1200px;
      height: auto;
      object-fit: cover;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .nav-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .nav-link {
      font-size: 12px; font-weight: 600; color: #94a3b8; text-decoration: none;
      padding: 6px 12px; border: 1px solid #2d3348; border-radius: 6px;
      white-space: nowrap; display: inline-flex; align-items: center;
      justify-content: center; height: 32px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: #e2e8f0; border-color: #4f6ef7; background: #1e2130; }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }
    @media (max-width: 740px) {
      .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    }
    @media (max-width: 480px) {
      .tool-grid { grid-template-columns: 1fr; gap: 16px; }
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      width: 100%;
      aspect-ratio: 1.7 / 1;
      border-radius: 50%;
      background: radial-gradient(ellipse at 40% 35%, #8B5E3C 0%, #6B3F1F 40%, #4A2A10 80%, #3A1E08 100%);
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.12),
        inset 0 -4px 12px rgba(0,0,0,0.5),
        0 6px 24px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      padding: 20px 24px;
    }
    .tool-btn:hover {
      transform: scale(1.05);
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.15),
        inset 0 -4px 12px rgba(0,0,0,0.5),
        0 8px 32px rgba(0,0,0,0.6);
    }

    /* Leather texture grain */
    .tool-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.6' fill='rgba(0,0,0,0.08)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Laces */
    .tool-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 40%;
      background: #fff;
      opacity: 0.5;
      border-radius: 2px;
      box-shadow:
        -8px -6px 0 0 rgba(255,255,255,0.35),
         8px -6px 0 0 rgba(255,255,255,0.35),
        -8px  0px 0 0 rgba(255,255,255,0.35),
         8px  0px 0 0 rgba(255,255,255,0.35),
        -8px  6px 0 0 rgba(255,255,255,0.35),
         8px  6px 0 0 rgba(255,255,255,0.35);
    }

    .tool-btn-text {
      position: relative;
      z-index: 1;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <div class="banner">
    <img src="https://assets.cdn.filesafe.space/hT14gzW082yuiAZaRY8l/media/69bbf0750a31c763e629738b.png" alt="Football Scout"/>
  </div>

  <div class="container">
    <div class="nav-bar">
      <a href="/account" class="nav-link">My Account</a>
      <a href="/logout" class="nav-link">Log Out</a>
    </div>

    <div class="tool-grid">
      <a href="/offensive" class="tool-btn">
        <span class="tool-btn-text">Offensive<br>Game Planning</span>
      </a>
      <a href="/scout" class="tool-btn">
        <span class="tool-btn-text">Defensive<br>Game Planning</span>
      </a>
      <a href="/halftime-advisor" class="tool-btn">
        <span class="tool-btn-text">Halftime<br>Advisor</span>
      </a>
      <a href="/game-analysis" class="tool-btn">
        <span class="tool-btn-text">Game<br>Analysis</span>
      </a>
      <a href="/recruiting" class="tool-btn">
        <span class="tool-btn-text">Recruiting<br>Evaluator</span>
      </a>
      <a href="/training" class="tool-btn">
        <span class="tool-btn-text">Training</span>
      </a>
    </div>
  </div>

</body>
</html>
