<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Football Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 48px; }
    .logo img { height: 36px; object-fit: contain; }
    .logo h1 { font-size: 20px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.02em; }

    .auth-card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .auth-card h2 {
      font-size: 22px; font-weight: 700; color: #e2e8f0;
      margin-bottom: 8px; text-align: center;
    }
    .auth-card .subtitle {
      font-size: 13px; color: #64748b; text-align: center; margin-bottom: 28px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label {
      font-size: 11px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    input[type="email"], input[type="password"] {
      background: #0f1117; border: 1px solid #2d3348; color: #e2e8f0;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      font-family: inherit; outline: none; width: 100%;
    }
    input:focus { border-color: #4f6ef7; }
    .btn-auth {
      display: block; width: 100%;
      background: #4f6ef7; border: none; color: #fff;
      padding: 12px; border-radius: 8px; font-size: 15px;
      font-weight: 700; font-family: inherit; cursor: pointer;
      margin-top: 8px;
    }
    .btn-auth:hover { background: #3b57e8; }
    .error-banner {
      background: #2d1b1b; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px;
    }
    .switch {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: #64748b;
    }
    .switch a { color: #4f6ef7; text-decoration: none; font-weight: 600; }
    .switch a:hover { color: #7b97ff; }
  </style>
</head>
<body>
  <a href="/" class="logo" style="text-decoration:none;">
    <img src="https://assets.cdn.filesafe.space/hT14gzW082yuiAZaRY8l/media/69b751fdad02763a460b988c.png" alt="WhatIfSports"/>
  </a>

  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">$7/month — cancel anytime</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="6+ characters" minlength="6"/>
      </div>
      <button type="submit" class="btn-auth">Sign Up</button>
    </form>
    <div class="switch">Already have an account? <a href="/login">Log in</a></div>
  </div>
</body>
</html>
