<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Football Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }
    .container { max-width: 700px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 700; color: #e2e8f0; margin-bottom: 32px; }

    .card {
      background: #1e2130; border: 1px solid #2d3348; border-radius: 12px;
      padding: 24px 28px; margin-bottom: 28px;
    }
    .card h2 {
      font-size: 11px; font-weight: 700; color: #f59e0b;
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; }
    input[type="text"], textarea {
      background: #0f1117; border: 1px solid #2d3348; color: #e2e8f0;
      padding: 10px 14px; border-radius: 8px; font-size: 14px; font-family: inherit;
      outline: none; width: 100%;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, textarea:focus { border-color: #4f6ef7; }

    .btn {
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 600; font-family: inherit; cursor: pointer; border: none;
    }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { background: #3b57e8; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; font-size: 12px; padding: 6px 14px; }
    .btn-danger:hover { background: #991b1b; }

    .video-list { display: flex; flex-direction: column; gap: 12px; }
    .video-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: #161926; border-radius: 8px;
      border: 1px solid #1a1f2e; cursor: default;
    }
    .drag-handle {
      cursor: grab; color: #475569; font-size: 18px; padding: 0 10px 0 0;
      user-select: none; line-height: 1;
    }
    .drag-handle:active { cursor: grabbing; }
    .sortable-ghost { opacity: 0.3; }
    .sortable-chosen { background: #252a3d; }
    .video-item-info { flex: 1; }
    .video-item-title { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .video-item-url { font-size: 12px; color: #475569; margin-top: 2px; word-break: break-all; }

    .empty { color: #475569; font-size: 13px; font-style: italic; }
  </style>
</head>
<body>
<div class="container">

  <h1>Admin — Training Videos</h1>

  <div class="card">
    <h2>Add Video</h2>
    <form method="POST">
      <input type="hidden" name="action" value="add"/>
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required placeholder="e.g. How to Read a Scouting Report"/>
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Brief description of the video..."></textarea>
      </div>
      <div class="field">
        <label for="video_url">YouTube or Vimeo URL</label>
        <input type="text" id="video_url" name="video_url" required placeholder="https://www.youtube.com/watch?v=..."/>
      </div>
      <button type="submit" class="btn btn-primary">Add Video</button>
    </form>
  </div>

  <div class="card">
    <h2>Existing Videos ({{ videos|length }})</h2>
    {% if videos %}
    <div class="video-list" id="videoList">
      {% for v in videos %}
      <div class="video-item" data-id="{{ v.id }}">
        <span class="drag-handle">&#10303;</span>
        <div class="video-item-info">
          <div class="video-item-title">{{ v.title }}</div>
          <div class="video-item-url">{{ v.video_url }}</div>
        </div>
        <form method="POST" style="margin:0;">
          <input type="hidden" name="action" value="delete"/>
          <input type="hidden" name="video_id" value="{{ v.id }}"/>
          <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this video?')">Delete</button>
        </form>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="empty">No videos added yet.</p>
    {% endif %}
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script>
  var el = document.getElementById('videoList');
  if (el) {
    Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: function() {
        var order = [];
        el.querySelectorAll('.video-item').forEach(function(item) {
          order.push(item.getAttribute('data-id'));
        });
        fetch('/admin/reorder', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(order)
        });
      }
    });
  }
</script>
</body>
</html>
